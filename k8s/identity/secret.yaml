apiVersion: v1
kind: Secret
metadata:
  name: identity-secret
type: Opaque
stringData:
  ConnectionStrings__Database: "Host=postgres;Database=kongroo_identity;Username=kongroo;Password=replace-with-secure-password"
  Jwt__SigningKey: "replace-with-a-secure-key-at-least-32-chars"
  BootstrapAdmin__Password: "replace-with-admin-password"
  RabbitMq__Username: "kongroo"
  RabbitMq__Password: "replace-with-secure-password"

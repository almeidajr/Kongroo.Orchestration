apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Deploy everything with a single command:
#   kubectl apply -k k8s/
# kustomize applies ConfigMaps/Secrets/Services before Deployments automatically.

resources:
  - postgres/configmap.yaml
  - postgres/secret.yaml
  - postgres/pvc.yaml
  - postgres/deployment.yaml
  - postgres/service.yaml
  - rabbitmq/configmap.yaml
  - rabbitmq/secret.yaml
  - rabbitmq/deployment.yaml
  - rabbitmq/service.yaml
  - identity/configmap.yaml
  - identity/secret.yaml
  - identity/deployment.yaml
  - identity/service.yaml
  - catalog/configmap.yaml
  - catalog/secret.yaml
  - catalog/deployment.yaml
  - catalog/service.yaml
  - payments/configmap.yaml
  - payments/secret.yaml
  - payments/deployment.yaml
  - payments/service.yaml
  - notifications/configmap.yaml
  - notifications/secret.yaml
  - notifications/deployment.yaml
  - notifications/service.yaml

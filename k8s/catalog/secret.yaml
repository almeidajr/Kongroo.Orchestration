apiVersion: v1
kind: Secret
metadata:
  name: catalog-secret
type: Opaque
stringData:
  ConnectionStrings__Database: "Host=postgres;Database=kongroo_catalog;Username=kongroo;Password=replace-with-secure-password"
  Jwt__SigningKey: "replace-with-same-key-as-identity-service"
  RabbitMq__Username: "kongroo"
  RabbitMq__Password: "replace-with-secure-password"
